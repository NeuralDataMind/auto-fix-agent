name: Auto-Fix Agent CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  autofix:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache Pip Packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache HuggingFace Models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-hf-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Clean Previous Vector Store
        run: |
          rm -rf chroma_db

      - name: Run RAG Indexer
        run: python indexer.py

      - name: Run AI Repair Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python agent.py

      - name: Remove Generated Vector Store Before Commit
        run: |
          rm -rf chroma_db

      - name: Commit and Push Fixes
        if: github.event_name == 'push'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain)" ]; then
            echo "Changes detected. Committing AI fix..."
            git add .
            git commit -m "bot: auto-fix applied [skip ci]"
            git pull origin main --rebase
            git push
          else
            echo "No changes to commit."
          fi
