name: Auto-Fix Agent CI/CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-heal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Cache HuggingFace Models
        uses: actions/cache@v3
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-huggingface-all-MiniLM-L6-v2

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Build RAG Memory (Index Codebase)
        run: |
          # We run the indexer but we WON'T commit the DB it creates
          python indexer.py

      - name: Run AI Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python agent.py

      - name: Check for Changes & Push Fix
        run: |
          git config --global user.name 'AutoFix AI'
          git config --global user.email 'ai-bot@neuraldatamind.com'

          # 🧹 CLEANUP: Force remove generated files so they are NEVER committed
          rm -rf chroma_db __pycache__ .pytest_cache

          # 🔄 SYNC: Pull the latest changes
          git pull origin main --rebase || echo "Pull failed or no changes, continuing..."

          if [ -n "$(git status --porcelain)" ]; then
            echo "🐛 Bug detected and fixed by AI. Pushing changes..."
            git add .
            # CRITICAL: [skip ci] prevents the agent from triggering its own workflow
            git commit -m "🤖 AI Auto-Fix: Resolved Unit Test Failures [skip ci]"
            git push
          else
            echo "✅ No fixes needed. Code is clean."
          fi